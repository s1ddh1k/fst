services:
  postgres:
    image: postgres:16
    container_name: fst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fst
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fst"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
